# sr configuration
# Reference: https://github.com/urmzd/sr#configuration

git:
  tag_prefix: v
  floating_tag: true

commit:
  types:
    minor:
      - feat
    patch:
      - fix
      - perf
      - refactor
    none:
      - docs
      - revert
      - chore
      - ci
      - test
      - build
      - style

changelog:
  file: CHANGELOG.md
  groups:
    - name: breaking
      content:
        - breaking
    - name: features
      content:
        - feat
    - name: bug-fixes
      content:
        - fix
    - name: performance
      content:
        - perf
    - name: refactoring
      content:
        - refactor
    - name: misc
      content:
        - docs
        - revert
        - chore
        - ci
        - test
        - build
        - style

channels:
  default: stable
  branch: main
  content:
    - name: stable

packages:
  - path: .
    version_files:
      - Cargo.toml
    stage_files:
      - Cargo.lock
      - README.md
      - action.yml
      - example.yml
    artifacts:
      - release-assets/fsrc-x86_64-unknown-linux-musl
      - release-assets/fsrc-aarch64-unknown-linux-musl
      - release-assets/fsrc-x86_64-apple-darwin
      - release-assets/fsrc-aarch64-apple-darwin
    publish:
      type: cargo
